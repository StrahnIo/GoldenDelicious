name: CI checks

on:
  pull_request:
  push:
    branches: main
  merge_group:

permissions: {}

jobs:
  test:
    name: Test on Linux${{ matrix.name_suffix }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stage: [stable, beta, nightly]
        include:
          - stage: beta
            name_suffix: " with beta features"
            extra_flags: --features beta
          - stage: nightly
            name_suffix: " with nightly features"
            extra_flags: --features nightly

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/prepare
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: msrv
          save-if: ${{ matrix.stage == 'stable' }}
      - name: Run tests
        run: >
          cargo test
          --verbose
          --release
          --workspace
          ${{ steps.prepare.outputs.feature-flags }}
          ${{ matrix.extra_flags }}
      - name: Verify working directory is clean
        run: git diff --exit-code

  # Advisory, so that a platform-specific toolchain hiccup cannot block a merge; Linux
  # is the gate.
  test-other-os:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macOS-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/prepare
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: msrv
          save-if: "false"
      - name: Run tests
        run: >
          cargo test
          --verbose
          --release
          --workspace
          ${{ steps.prepare.outputs.feature-flags }}
      - name: Verify working directory is clean
        run: git diff --exit-code

  test-32-bit:
    name: Test on i686-unknown-linux-gnu${{ matrix.name_suffix }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stage: [stable, beta, nightly]
        include:
          - stage: beta
            name_suffix: " with beta features"
            beta_features: true
          - stage: nightly
            name_suffix: " with nightly features"
            nightly_features: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/prepare
        with:
          beta-features: ${{ matrix.beta_features || false }}
          nightly-features: ${{ matrix.nightly_features || false }}
      - name: Install cross-platform support dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib
      - run: rustup target add i686-unknown-linux-gnu
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: i686
          save-if: ${{ matrix.stage == 'stable' }}
      - name: Run tests
        run: >
          cargo test
          --verbose
          --release
          --workspace
          --target i686-unknown-linux-gnu
          ${{ steps.prepare.outputs.feature-flags }}

  build:
    name: Build target ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - wasm32-unknown-unknown
          # `wasm32-wasi` was renamed to `wasm32-wasip1` in Rust 1.78; the old target
          # name no longer resolves, so this job could not have worked on 1.88.
          - wasm32-wasip1

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/prepare
        with:
          nightly-features: true
          test-dependencies: false
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: wasm-${{ matrix.target }}
      - name: cargo build
        run: >
          cargo build
          --workspace
          ${{ steps.prepare.outputs.feature-flags }}
          --target ${{ matrix.target }}

  build-latest:
    name: Latest build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # Override the `rust-toolchain.toml` MSRV pin so this job really does exercise the
    # latest stable toolchain, against the latest dependencies.
    env:
      RUSTUP_TOOLCHAIN: stable
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macOS-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/prepare
      # Pinned to a hash, so the toolchain has to be named explicitly rather than
      # inferred from the ref.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master HEAD 2026-05-31
        id: toolchain
        with:
          toolchain: stable
      - run: rustup override set "${TOOLCHAIN}"
        shell: sh
        env:
          TOOLCHAIN: ${{ steps.toolchain.outputs.name }}
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - name: Remove lockfile to build with latest dependencies
        run: rm Cargo.lock
      - name: Build crates
        run: >
          cargo build
          --workspace
          --all-targets
          ${{ steps.prepare.outputs.feature-flags }}
          --verbose
      - name: Verify working directory is clean (excluding lockfile)
        run: git diff --exit-code ':!Cargo.lock'

  bitrot:
    name: Bitrot check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/prepare
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: msrv
          save-if: "false"
      - run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      # Build benchmarks and examples to prevent bitrot
      - name: Build benchmarks
        run: cargo build --workspace --benches --examples --all-features

  book:
    name: Book tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/prepare
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: msrv
          save-if: "false"
      - name: cargo build
        run: cargo build --workspace
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # v2.0.0
        with:
          mdbook-version: '0.4.35'
      - name: Test halo2 book
        run: mdbook test -L target/debug/deps book/

  codecov:
    name: Code coverage
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/prepare
        with:
          nightly-features: true
      - name: Generate coverage report
        run: >
          cargo tarpaulin
          --engine llvm
          --workspace
          ${{ steps.prepare.outputs.feature-flags }}
          --timeout 3600
          --out xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
        with:
          fail_ci_if_error: false

  # Requires `rustdoc::broken_intra_doc_links = "deny"` (set in `[workspace.lints]`).
  #
  # This runs on the pinned toolchain rather than nightly (which is what would emulate
  # the docs.rs render): some of this workspace's older dependencies no longer compile
  # on current nightly, so a nightly rustdoc job would fail on them rather than on
  # anything in this repository.
  doc-links:
    name: Intra-doc links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/prepare
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: msrv
          save-if: "false"
      - run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - run: cargo fetch
      - name: Check intra-doc links
        run: >
          cargo doc
          --no-deps
          --workspace
          ${{ steps.prepare.outputs.feature-flags }}
          --document-private-items

  clippy:
    name: Clippy (MSRV)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/prepare
        with:
          nightly-features: true
      - run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - name: Run clippy
        uses: auguwu/clippy-action@9817d076b82df0194935be9db6154c56ac07b317 # 1.5.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # cargo-level flags go in `check-args` (before the `--`); lint levels go in
          # `deny`/`warn` (the action places them after the `--`).
          check-args: >
            ${{ steps.prepare.outputs.feature-flags }}
            --all-targets
          deny: warnings

  # Informative only: beta clippy shows what the next stable will complain about.
  clippy-beta:
    name: Clippy (beta)
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      checks: write
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: prepare
        uses: ./.github/actions/prepare
        with:
          nightly-features: true
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master HEAD 2026-05-31
        id: toolchain
        with:
          toolchain: beta
          components: clippy # auguwu/clippy-action expects clippy already installed
      - run: rustup override set "${TOOLCHAIN}"
        shell: sh
        env:
          TOOLCHAIN: ${{ steps.toolchain.outputs.name }}
      - run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - name: Run Clippy (beta)
        uses: auguwu/clippy-action@9817d076b82df0194935be9db6154c56ac07b317 # 1.5.0
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          check-args: >
            ${{ steps.prepare.outputs.feature-flags }}
            --all-targets
          warn: clippy::all

  fmt:
    name: Rustfmt
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check formatting
        run: cargo fmt --all -- --check

  # The single check to mark as required in branch protection. The advisory jobs
  # (other-OS tests, beta clippy, coverage upload) are deliberately left out, so a flake
  # in one of them cannot block a merge.
  required-checks:
    name: Required status checks have passed
    needs:
      - test
      - test-32-bit
      - build
      - build-latest
      - bitrot
      - book
      - clippy
      - doc-links
      - fmt
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Determine whether all required-pass steps succeeded
        run: echo "${NEEDS}" | jq -e '[ .[] | .result == "success" ] | all'
        env:
          NEEDS: ${{ toJSON(needs) }}
